<!DOCTYPE html>
<html>
<head>
  <title>Smart Appointment Reminder</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }

    .box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>📅 Reminder App</h2>

  <input type="datetime-local" id="date"><br>

  <input type="text" id="message" placeholder="Message"><br>

  <input type="email" id="email" placeholder="Email"><br>

  <input type="text" id="phone" placeholder="Phone (+1...)"><br>

  <button onclick="setReminder()">Set Reminder</button>

  <p id="status"></p>
</div>

<script>
async function setReminder() {
  const date = document.getElementById("date").value;
  const message = document.getElementById("message").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;

  if (!date || !message || !email || !phone) {
    alert("❗ Fill all fields");
    return;
  }

  const data = { date, message, email, phone };

  try {
    const res = await fetch("http://localhost:3000/reminder", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    document.getElementById("status").innerText = "✅ Reminder Set Successfully!";
  } catch (err) {
    alert("❌ Server not running!");
  }
}
</script>

</body>
</html>
